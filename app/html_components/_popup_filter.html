<section class="popup popup_filter">
    <div class="container container_filter">
        <div class="popup__close_filter">
            <svg class="icon icon_contacts">
                <use xlink:href="../img/sprite.svg#close"></use>
            </svg>
        </div>
        <fieldset class="fieldset">
            <legend class="title title_legend">Цена за сутки</legend>
            <div class="container container_inputs">
                <input class="input_minmax" type="text" id="min" value="от 100" name="price_min">
                <input class="input_minmax" type="text" id="max" value="до 600" name="price_max">
            </div>
        </fieldset>
        <fieldset class="fieldset">
            <legend class="title title_legend">Площадь</legend>
            <div class="container container_checks">
                <div class="container container_cheks">
                    <input class="input_check" type="checkbox" name="check" id="one">
                    <span class="checkmark"></span>
                    <label class="label_check" for="one">0,63 м2</label>
                </div>
                <div class="container container_cheks">
                    <input class="input_check" type="checkbox" name="check" id="two">
                    <span class="checkmark"></span>
                    <label class="label_check" for="two">0,90 м2</label>
                </div>
                <div class="container container_cheks">
                    <input class="input_check" type="checkbox" name="check" id="three">
                    <span class="checkmark"></span>
                    <label class="label_check" for="three">1,13 м2</label>
                </div>
                <div class="container container_cheks">
                    <input class="input_check" type="checkbox" name="check" id="four">
                    <span class="checkmark"></span>
                    <label class="label_check" for="four">1,56 м2</label>
                </div>
                <div class="container container_cheks">
                    <input class="input_check" type="checkbox" name="check" id="five">
                    <span class="checkmark"></span>
                    <label class="label_check" for="five">2,56 м2</label>
                </div>
                <div class="container container_cheks">
                    <input class="input_check" type="checkbox" name="check" id="six">
                    <span class="checkmark"></span>
                    <label class="label_check" for="six">2,88 м2</label>
                </div>
            </div>
        </fieldset>
        <fieldset class="fieldset">
            <legend class="title title_legend">Оснащение номера</legend>
            <div class="container container_checks">
                <div class="container container_cheks">
                    <input class="input_check" type="checkbox" name="check" id="features_1">
                    <span class="checkmark"></span>
                    <label class="label_check" for="features_1">Пустой номер</label>
                </div>
                <div class="container container_cheks">
                    <input class="input_check" type="checkbox" name="check" id="features_2">
                    <span class="checkmark"></span>
                    <label class="label_check" for="features_2">Лежак</label>
                </div>
                <div class="container container_cheks">
                    <input class="input_check" type="checkbox" name="check" id="features_3">
                    <span class="checkmark"></span>
                    <label class="label_check" for="features_3">Когтеточка</label>
                </div>
                <div class="container container_cheks">
                    <input class="input_check" type="checkbox" name="check" id="features_4">
                    <span class="checkmark"></span>
                    <label class="label_check" for="features_4">Игровой комплекс</label>
                </div>
                <div class="container container_cheks">
                    <input class="input_check" type="checkbox" name="check" id="features_5">
                    <label class="label_check" for="features_5">Домик</label>
                </div>
            </div>
        </fieldset>
        <div class="container container_submits">
            <input class="input input_submits input_submits-submit" type="submit" value="Подобрать">
            <input class="input input_submits input_submits-reset" type="reset" value="Сбросить фильтр">
        </div>
    </div>
</section>
